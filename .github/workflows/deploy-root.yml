name: Deploy Root Gallery

on:
  push:
    branches: [main]
    paths:
      - index.html
      - .github/workflows/deploy-root.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare root site files
        run: |
          mkdir -p public
          cp index.html public/index.html

      - name: Deploy root to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          keep_files: true
